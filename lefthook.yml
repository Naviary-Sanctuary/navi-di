pre-commit:
  parallel: true
  jobs:
    - name: lint
      glob: '**/*.{js,ts}'
      run: bunx oxlint --deny-warnings {staged_files}
    - name: fmt-check
      glob: '**/*.{js,md,ts,yaml,yml}'
      run: sh -c 'if [ "$#" -eq 0 ]; then exit 0; fi; bunx oxfmt --check --config .oxfmt.json "$@"' -- {staged_files}
